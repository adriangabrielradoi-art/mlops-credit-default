# Kedro Data Catalog — base (shared across environments).
#
# The catalog is the single place where Kedro learns how to load and
# save each named dataset. Pipeline nodes refer to datasets by these
# names (e.g. ``inputs="raw_data"``) and Kedro handles the I/O.
#
# Layer convention (Kedro best practice):
#   01_raw           untouched inputs
#   02_intermediate  type-coerced, deduped
#   03_primary       domain-validated
#   04_feature       engineered features
#   05_model_input   train/val/test splits
#   06_models        serialized models
#   07_model_output  predictions
#   08_reporting     SHAP plots, drift reports, metrics
#
# Each entry below is commented out because the dataset is not yet
# chosen — TODO(dataset) once the group commits.

# ---- 01_raw ---------------------------------------------------------
# UCI Credit Card Default — original .xls with a 2-row header. header:1
# selects the real-name row (LIMIT_BAL, SEX, ...). The file is never modified.
raw_data:
  type: pandas.ExcelDataset
  filepath: "data/01_raw/Copy of default of credit card clients.xls"
  load_args:
    engine: xlrd
    header: 1

# ---- 02_intermediate ------------------------------------------------
# Typed, quality-passed copy of raw (values unchanged). Written by data_quality.
validated_data:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/validated_data.parquet

# ---- 03_primary -----------------------------------------------------
# Cleaned, deduped, real-typed table. Written by data_cleaning.
cleaned_data:
  type: pandas.ParquetDataset
  filepath: data/03_primary/cleaned_data.parquet
reference_distribution:              # written by data_split, baseline for data_drifts
  type: pandas.ParquetDataset
  filepath: data/03_primary/reference_distribution.parquet

# ---- 04_feature -----------------------------------------------------
# Engineered features (canonical downstream input). Written by data_feat_engineering.
feature_table:
  type: pandas.ParquetDataset
  filepath: data/04_feature/feature_table.parquet

# ---- 05_model_input -------------------------------------------------
# Stratified, seeded splits written by data_split.
X_train: { type: pandas.ParquetDataset, filepath: data/05_model_input/X_train.parquet }
y_train: { type: pandas.ParquetDataset, filepath: data/05_model_input/y_train.parquet }
X_val:   { type: pandas.ParquetDataset, filepath: data/05_model_input/X_val.parquet }
y_val:   { type: pandas.ParquetDataset, filepath: data/05_model_input/y_val.parquet }
X_test:  { type: pandas.ParquetDataset, filepath: data/05_model_input/X_test.parquet }
y_test:  { type: pandas.ParquetDataset, filepath: data/05_model_input/y_test.parquet }

# ---- 06_models ------------------------------------------------------
# Dict {family: fitted best model}. Written by model_train.
trained_models:
  type: pickle.PickleDataset
  filepath: data/06_models/trained_models.pkl
champion_model:                      # also registered in MLflow (alias Champion). Written by model_selection.
  type: pickle.PickleDataset
  filepath: data/06_models/champion_model.pkl
# drift_pca:                         # PCA fit on training data; data_drifts uses for multivariate drift
#   type: pickle.PickleDataset
#   filepath: data/06_models/drift_pca.pkl

# ---- 07_model_output -----------------------------------------------
# Batch predictions (proba + decision). Written by model_predict.
predictions:
  type: pandas.ParquetDataset
  filepath: data/07_model_output/predictions.parquet
# drift_flags:                       # boolean per-feature flags; triggers retrain
#   type: json.JSONDataset
#   filepath: data/07_model_output/drift_flags.json

# ---- 08_reporting --------------------------------------------------
ge_report:                           # from data_quality (GE validation results)
  type: json.JSONDataset
  filepath: data/08_reporting/ge_report.json

feature_store_status:                # from data_feat_engineering (Hopsworks sync result)
  type: json.JSONDataset
  filepath: data/08_reporting/feature_store_status.json

training_metrics:                    # from model_train (val metrics per family)
  type: json.JSONDataset
  filepath: data/08_reporting/training_metrics.json

decision_log:                        # from model_predict (batch score summary)
  type: json.JSONDataset
  filepath: data/08_reporting/decision_log.json

shap_predictions:                    # from model_predict (per-prediction SHAP)
  type: pandas.ParquetDataset
  filepath: data/08_reporting/shap_predictions.parquet
shap_summary:                        # global SHAP, from model_selection
  type: matplotlib.MatplotlibDataset
  filepath: data/08_reporting/shap_summary.png

champion_info:                       # which family won + registry version
  type: json.JSONDataset
  filepath: data/08_reporting/champion_info.json
# shap_predictions:                  # per-prediction SHAP, from model_predict
#   type: pandas.ParquetDataset
#   filepath: data/08_reporting/shap_predictions.parquet
# decision_log:                      # threshold, FP/TN per run, from model_predict
#   type: pandas.CSVDataset
#   filepath: data/08_reporting/decision_log.csv
drift_summary:                       # clean-vs-drifted drift verdict, from data_drifts
  type: json.JSONDataset
  filepath: data/08_reporting/drift_summary.json
psi_per_feature:                     # per-feature PSI/JS/KS table (biased batch)
  type: pandas.CSVDataset
  filepath: data/08_reporting/psi_per_feature.csv
drift_report:                        # Evidently consolidated HTML (best-effort)
  type: text.TextDataset
  filepath: data/08_reporting/drift_report.html
  fs_args:
    open_args_save:
      encoding: utf-8                 # Evidently HTML has non-cp1252 chars (Windows)
monitoring_dashboard:                # FINAL aggregate; the grader opens this one
  type: text.TextDataset
  filepath: data/08_reporting/monitoring_dashboard.html
  fs_args:
    open_args_save:
      encoding: utf-8
